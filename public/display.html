<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クイズスコアボード（表示用）</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .header { 
            background: rgba(255, 255, 255, 0.9); color: #333; padding: 15px 30px; 
            border-radius: 15px; margin-bottom: 20px; font-size: 1.3em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; border: 2px solid #007aff;
        }
        .board { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 1600px; }
        .player-card {
            background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: calc(25% - 20px); min-width: 280px; padding: 25px; text-align: center;
            position: relative; overflow: hidden; transition: all 0.3s ease;
        }
        .player-name { font-size: 2.3em; font-weight: bold; margin-bottom: 15px; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score-area { display: flex; justify-content: space-around; align-items: center; }
        .score-box { text-align: center; width: 45%; }
        .score-label { font-size: 1.3em; color: #666; margin-bottom: 5px; font-weight: bold; }
        .score-val { font-size: 4.5em; font-weight: bold; line-height: 1; }
        .score-val.maru { color: #ff3b30; }
        .score-val.batsu { color: #007aff; }
        
        .player-card.win { background: #fffdf0; box-shadow: 0 0 35px rgba(255, 204, 0, 0.8); border: 5px solid #ffcc00; transform: scale(1.02); }
        .player-card.win::after { content: "WINNER!"; position: absolute; top: 20px; right: -35px; background: #ffcc00; color: white; padding: 5px 40px; transform: rotate(45deg); font-weight: bold; font-size: 1.1em; letter-spacing: 1px; }
        .player-card.eliminated { background: #e0e0e0; opacity: 0.5; filter: grayscale(100%); }
        .player-card.eliminated::after { content: "脱落"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #cc0000; font-size: 4.5em; font-weight: bold; border: 8px solid #cc0000; padding: 5px 15px; border-radius: 15px; opacity: 0.8; letter-spacing: 2px; background: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="header" id="setup-header">
        操作画面（スマホなど）でこのIDを入力してください: <strong id="peer-id" style="color: #ff3b30; font-size: 1.4em; margin-left: 5px;">取得中...</strong>
    </div>
    <div class="board" id="board"></div>

    <script>
        let gameState = Array.from({ length: 8 }, (_, i) => ({
            id: i, name: `Player ${i + 1}`, score: 0, penalty: 0, status: 'active', active: i < 4
        }));
        let connections = [];

        const peer = new Peer();
        peer.on('open', (id) => {
            document.getElementById('peer-id').innerText = id;
        });

        peer.on('connection', (conn) => {
            connections.push(conn);
            document.getElementById('setup-header').style.display = 'none';

            conn.on('open', () => {
                conn.send({ type: 'sync', state: gameState });
            });

            conn.on('data', (data) => {
                if (data.type === 'updatePlayer') {
                    const index = gameState.findIndex(p => p.id === data.player.id);
                    if (index !== -1) gameState[index] = data.player;
                    broadcastState();
                } else if (data.type === 'updateBulkActive') {
                    gameState.forEach((p, idx) => p.active = idx < data.count);
                    broadcastState();
                } else if (data.type === 'playSound') {
                    if (data.sound === 'maru') playMaru();
                    if (data.sound === 'batsu') playBatsu();
                } else if (data.type === 'resetAll') {
                    gameState = gameState.map(p => ({ ...p, score: 0, penalty: 0, status: 'active' }));
                    broadcastState();
                }
            });
        });

        function broadcastState() {
            renderBoard();
            connections.forEach(conn => {
                if (conn.open) conn.send({ type: 'sync', state: gameState });
            });
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            gameState.filter(p => p.active).forEach(player => {
                const card = document.createElement('div');
                card.className = `player-card ${player.status}`;
                card.innerHTML = `
                    <div class="player-name">${player.name}</div>
                    <div class="score-area">
                        <div class="score-box"><div class="score-label">〇</div><div class="score-val maru">${player.score}</div></div>
                        <div class="score-box"><div class="score-label">✕</div><div class="score-val batsu">${player.penalty}</div></div>
                    </div>
                `;
                board.appendChild(card);
            });
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playMaru() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
        function playBatsu() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(140, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        renderBoard();
        window.addEventListener('click', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); });
    </script>
</body>
</html>
