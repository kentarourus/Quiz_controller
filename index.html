<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Controller - クイズ大会システム</title>
    <!-- Include PeerJS for WebRTC Communication -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Include Custom Stylesheet -->
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <!-- Theme toggle moved to settings modal -->
    <!-- Mode Selection Screen -->
    <div id="mode-selection">
        <h1>Quiz Controller</h1>
        <p>この端末の役割を選んでください</p>
        <button class="btn-mode btn-display" onclick="startDisplayMode()">
            📺 プロジェクター用
            <small>(スコアボードを表示)</small>
        </button>
        <button class="btn-mode btn-controller" onclick="startControllerMode()">
            📱 スマホ操作用
            <small>(コントローラーを表示)</small>
        </button>
    </div>

    <!-- Display Mode (Projector Screen) -->
    <div id="display-mode">
        <button id="btn-show-join" class="top-btn" onclick="showJoinModal()" style="left: 15px;">🔗 参加</button>
        <button id="btn-show-settings" class="top-btn" onclick="showSettingsModal()" style="right: 15px;">⚙️ 設定</button>

        <h1 id="display-quiz-title" class="header-display" style="display:inline-block;">クイズ大会</h1>

        <div class="board" id="board">
            <!-- Player cards will be injected here dynamically -->
        </div>

        <!-- Join Modal -->
        <div id="modal-join" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <button class="modal-close" onclick="hideJoinModal()">×</button>
                <h2>参加方法</h2>
                <div style="display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 20px; flex-wrap: wrap;">
                    <div>
                        <div style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 5px;">ルームID</div>
                        <strong id="peer-id" style="font-size: 4rem; color: var(--success);">---</strong>
                    </div>
                    <div style="border-left: 2px solid var(--md-sys-color-surface-container-highest); height: 100px;"></div>
                    <div>
                        <div style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 10px;">スマホでスキャン</div>
                        <div id="qrcode" style="background: white; padding: 10px; border-radius: 10px; display: inline-block;"></div>
                    </div>
                </div>
                <div style="margin-top: 30px; background: rgba(0,0,0,0.1); padding: 15px; border-radius: 12px; word-break: break-all;">
                    <div style="font-size: 1rem; color: var(--text-muted); margin-bottom: 5px;">URLで直接アクセス</div>
                    <a id="join-url-link" href="#" target="_blank" style="color: var(--md-sys-color-primary); font-size: 1.1rem; font-weight: bold; text-decoration: none;">---</a>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="modal-settings" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <button class="modal-close" onclick="hideSettingsModal()">×</button>
                <h2>設定</h2>
                <div class="settings-list">
                    <div class="setting-item">
                        <span>テーマ切替</span>
                        <button id="theme-toggle" class="btn-action" style="background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); padding: 10px 20px;" onclick="toggleTheme()">🌞 / 🌙 切替</button>
                    </div>
                    <div class="setting-item">
                        <span>全画面表示</span>
                        <button class="btn-action" style="background: var(--success); color: #fff; padding: 10px 20px;" onclick="toggleFullscreen()">⛶ 切替</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Controller Mode (Mobile/Admin Screen) -->
    <div id="controller-mode">
        <div class="setup-area" id="setup">
            <h2>表示画面のIDを入力して接続</h2>
            <input type="tel" id="target-id" placeholder="6桁のID" autocomplete="off" autocorrect="off" autocapitalize="off" maxlength="6">
            <br>
            <button onclick="connectToDisplay()">接続する</button>
            <p id="status-msg" style="color:var(--danger); font-weight:bold; margin-top:15px; font-size:1.1rem;"></p>
        </div>

        <div class="global-controls" id="global-controls">
            <div class="control-row" style="width: 100%; justify-content: flex-start; gap: 15px; border-bottom: 1px solid var(--md-sys-color-surface-container-highest); padding-bottom: 15px;">
                <label style="font-weight:600;">🏆 大会名:</label>
                <input type="text" id="quiz-title-input" placeholder="大会名を入力" style="font-family: 'Outfit', 'Noto Sans JP', sans-serif; font-size: 1.1rem; padding: 10px 15px; border-radius: 12px; border: none; background: var(--md-sys-color-surface-container-highest); color: var(--md-sys-color-on-surface); outline: none; flex-grow: 1; max-width: 300px; font-weight: 700;" onchange="updateQuizTitle(this.value)">
                
                <div style="width: 20px;"></div><!-- スペーサー -->

                <label style="font-weight:600;">👤 表示人数:</label>
                <select id="bulk-count" class="count-selector" onchange="changePlayerCount(this.value)">
                    <option value="2">2人</option>
                    <option value="3">3人</option>
                    <option value="4" selected>4人</option>
                    <option value="5">5人</option>
                    <option value="6">6人</option>
                    <option value="7">7人</option>
                    <option value="8">8人</option>
                </select>
            </div>
            
            <div class="control-row" style="justify-content: space-between;">
                <!-- 音声系グループ -->
                <div style="display: flex; gap: 15px;">
                    <button class="btn-action btn-sound-m" onclick="sendAction('playSound', 'maru')">🔊 ピンポン</button>
                    <button class="btn-action btn-sound-b" onclick="sendAction('playSound', 'batsu')">🔊 ブー</button>
                </div>
                
                <!-- 進行系グループ -->
                <div style="display: flex; gap: 15px;">
                    <button class="btn-action btn-reset-buzzer" onclick="sendAction('resetBuzzer')">🛑 早押しリセット</button>
                    <button class="btn-action btn-reset" onclick="sendAction('resetAll')">🔄 全リセット</button>
                </div>
            </div>
        </div>

        <div class="grid" id="controls">
            <!-- Control cards will be injected here dynamically -->
        </div>
    </div>

    <!-- Include Custom Application Logic -->
    <script src="app.js"></script>
</body>
</html>
