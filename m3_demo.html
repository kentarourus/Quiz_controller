<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material 3 Expressive Demo</title>
    <link rel="stylesheet" href="m3_demo.css">
</head>
<body>

<div class="demo-container">

    <!-- Projector Screen Mockup -->
    <div class="screen-mockup tv-screen">
        <h1 class="tv-title">クイズ大会</h1>
        
        <div class="board">
            <div class="player-card">
                <div class="player-name">Player 1</div>
                <div class="player-score">10</div>
            </div>
            
            <div class="player-card active">
                <div class="player-name">Player 2</div>
                <div class="player-score">25</div>
                <div style="margin-top:10px; font-weight: bold; color: var(--md-sys-color-primary);">✨ 回答権獲得！</div>
            </div>
            
            <div class="player-card">
                <div class="player-name">Player 3</div>
                <div class="player-score">-5</div>
            </div>
            
            <div class="player-card">
                <div class="player-name">Player 4</div>
                <div class="player-score">0</div>
            </div>
        </div>
    </div>

    <!-- Mobile Controller Mockup -->
    <div class="mobile-screen">
        <div class="mobile-header">コントローラー</div>
        
        <button class="fab">🔔</button>
        <div style="text-align: center; margin-bottom: 20px; color: var(--md-sys-color-primary); font-weight: bold;">タップして回答！</div>
        
        <div class="mobile-card">
            <div>
                <div class="mobile-card-title">Player 1</div>
                <div class="mobile-card-score">10</div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-icon">-</button>
                <button class="btn-icon">+</button>
            </div>
        </div>
        
        <div class="mobile-card" style="background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);">
            <div>
                <div class="mobile-card-title">Player 2</div>
                <div class="mobile-card-score">25</div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-icon" style="background-color: var(--md-sys-color-surface-container);">-</button>
                <button class="btn-icon" style="background-color: var(--md-sys-color-surface-container);">+</button>
            </div>
        </div>
        
        <button class="btn-pill">🛑 早押しリセット</button>
    </div>

</div>

</body>
</html>
